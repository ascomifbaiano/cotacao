<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Cotação</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 80px; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2b6cb0; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .loading { background: #ebf8ff; color: #2b6cb0; border: 1px solid #90cdf4; }
        .success { background: #f0fff4; color: #2f855a; border: 1px solid #9ae6b4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Cotação Automatizada</h2>
    <p>Insira os itens separados por vírgula:</p>
    <textarea id="itensInput" placeholder="Ex: iPhone 17 Pro Max 256GB, Projetor BenQ LH730, Drone DJI Mini 4 Pro"></textarea>
    <button id="btnGerar" onclick="iniciarCotacao()">Processar Cotação</button>

    <div id="statusMsg" class="status loading">⏳ Enviando requisição para o servidor...</div>
    <div id="resultadoMsg" class="status success">
        ✅ Relatório gerado! Vá até a aba <b>Actions</b> do GitHub para baixar o PDF.
        <br><br>
        <a id="linkActions" href="https://github.com/SEU_USUARIO/SEU_REPOSITORIO/actions" target="_blank" style="color: #2f855a; font-weight: bold;">Abrir GitHub Actions</a>
    </div>
</div>

<script>
    const GITHUB_USER = 'SEU_USUARIO';
    const GITHUB_REPO = 'SEU_REPOSITORIO';
    const GITHUB_PAT = 'SEU_GITHUB_PAT'; 

    async function iniciarCotacao() {
        const itens = document.getElementById('itensInput').value;
        if (!itens) return alert("Digite pelo menos um item!");

        document.getElementById('btnGerar').disabled = true;
        document.getElementById('statusMsg').style.display = 'block';
        document.getElementById('resultadoMsg').style.display = 'none';

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/actions/workflows/cotador.yml/dispatches`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_PAT}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { itens: itens }
                })
            });

            if (response.ok || response.status === 204) {
                document.getElementById('statusMsg').style.display = 'none';
                document.getElementById('resultadoMsg').style.display = 'block';
            } else {
                throw new Error('Falha na requisição');
            }
        } catch (error) {
            alert("Erro ao conectar com o GitHub Actions. Verifique seu PAT e permissões.");
            console.error(error);
        } finally {
            document.getElementById('btnGerar').disabled = false;
        }
    }
</script>

</body>
</html>
